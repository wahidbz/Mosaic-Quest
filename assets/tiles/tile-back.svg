<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="60" height="72" viewBox="0 0 60 72">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f3e8"/>
      <stop offset="100%" style="stop-color:#ede0c4"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#a07848"/>
    </linearGradient>
  </defs>
  <!-- Tile body -->
  <rect x="1" y="1" width="56" height="68" rx="6" ry="6" fill="url(#bg)" stroke="url(#border)" stroke-width="1.5"/>
  <!-- 3D shadow right -->
  <rect x="3" y="3" width="56" height="68" rx="6" ry="6" fill="rgba(0,0,0,0.15)" style="mix-blend-mode:multiply"/>
  <!-- Highlight top -->
  <rect x="2" y="2" width="55" height="30" rx="5" ry="5" fill="rgba(255,255,255,0.4)"/>
  <!-- Decorative pattern -->
  <text x="30" y="38" font-family="serif" font-size="28" text-anchor="middle" fill="#c9a96e" opacity="0.4">◈</text>
</svg>
